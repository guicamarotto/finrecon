services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finrecon}
      POSTGRES_USER: ${POSTGRES_USER:-finrecon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finrecon_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finrecon} -d ${POSTGRES_DB:-finrecon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-finrecon}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-finrecon_dev_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── MinIO bucket setup (one-shot) ─────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password} &&
        mc mb --ignore-existing local/${MINIO_BUCKET_NAME:-finrecon-uploads} &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./src
      dockerfile: FinRecon.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-finrecon};
        Username=${POSTGRES_USER:-finrecon};
        Password=${POSTGRES_PASSWORD:-finrecon_dev_password}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER:-finrecon}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS:-finrecon_dev_password}
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      MinIO__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
      MinIO__BucketName: ${MINIO_BUCKET_NAME:-finrecon-uploads}
      MinIO__UseSSL: "false"
      Jwt__Secret: ${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-32-chars}
      Jwt__Issuer: finrecon-api
      Jwt__Audience: finrecon-frontend
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ─── Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./src
      dockerfile: FinRecon.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-finrecon};
        Username=${POSTGRES_USER:-finrecon};
        Password=${POSTGRES_PASSWORD:-finrecon_dev_password}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_DEFAULT_USER:-finrecon}
      RabbitMQ__Password: ${RABBITMQ_DEFAULT_PASS:-finrecon_dev_password}
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      MinIO__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
      MinIO__BucketName: ${MINIO_BUCKET_NAME:-finrecon-uploads}
      MinIO__UseSSL: "false"
    depends_on:
      api:
        condition: service_healthy # ensures migrations ran before Worker starts

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-5000}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
