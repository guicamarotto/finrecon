apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finrecon-api-hpa
  labels:
    {{- include "finrecon.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finrecon-api
  minReplicas: {{ .Values.hpa.api.minReplicas }}
  maxReplicas: {{ .Values.hpa.api.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.api.cpuUtilization }}
