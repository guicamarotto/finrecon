apiVersion: apps/v1
kind: Deployment
metadata:
  name: finrecon-api
  labels:
    {{- include "finrecon.labels" . | nindent 4 }}
    app: finrecon-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: finrecon-api
  template:
    metadata:
      labels:
        app: finrecon-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: finrecon-config
            - secretRef:
                name: finrecon-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finrecon-api
  labels:
    {{- include "finrecon.labels" . | nindent 4 }}
spec:
  selector:
    app: finrecon-api
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
