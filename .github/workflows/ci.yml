name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/FinRecon.sln

      - name: Build
        run: dotnet build src/FinRecon.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test src/FinRecon.sln
          --no-build -c Release
          --logger trx
          --collect:"XPlat Code Coverage"
          --results-directory TestResults/

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: TestResults/
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── Docker build check ───────────────────────────────────────────────────
  docker-check:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/FinRecon.API/Dockerfile
          push: false

      - uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/FinRecon.Worker/Dockerfile
          push: false

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
