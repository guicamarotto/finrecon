name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  trivy-api:
    name: Trivy — API Image
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/finrecon-api:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  trivy-worker:
    name: Trivy — Worker Image
    runs-on: ubuntu-latest
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/finrecon-worker:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

  dotnet-vulnerabilities:
    name: .NET — Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore src/FinRecon.sln
      - name: Check for vulnerable packages
        run: dotnet list src/FinRecon.sln package --vulnerable --include-transitive

  npm-audit:
    name: npm — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm audit --audit-level=high
        working-directory: frontend
