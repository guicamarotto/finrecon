name: CD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ─── Build & push images ──────────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-api
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-worker
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/FinRecon.API/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-api:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-api:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/FinRecon.Worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-worker:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-worker:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-frontend:sha-${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/finrecon-frontend:latest
          build-args: VITE_API_BASE_URL=https://finrecon.example.com

  # ─── Deploy to Kubernetes ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ secrets.KUBECONFIG != '' }}   # Skip if kubeconfig not configured
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy via Helm
        run: |
          helm upgrade --install finrecon ./infra/k8s/finrecon \
            --namespace default \
            --create-namespace \
            --atomic \
            --timeout 5m \
            --set api.image.tag=sha-${{ github.sha }} \
            --set worker.image.tag=sha-${{ github.sha }} \
            --set frontend.image.tag=sha-${{ github.sha }} \
            --set secrets.dbConnectionString="${{ secrets.DB_CONNECTION_STRING }}" \
            --set secrets.rabbitMQHost="${{ secrets.RABBITMQ_HOST }}" \
            --set secrets.rabbitMQUsername="${{ secrets.RABBITMQ_USERNAME }}" \
            --set secrets.rabbitMQPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --set secrets.minioEndpoint="${{ secrets.MINIO_ENDPOINT }}" \
            --set secrets.minioAccessKey="${{ secrets.MINIO_ACCESS_KEY }}" \
            --set secrets.minioSecretKey="${{ secrets.MINIO_SECRET_KEY }}" \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}"
        # --atomic ensures automatic rollback if the deploy fails
